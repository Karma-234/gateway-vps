version: '3.9'

services:
  db:
    image: mariadb:10.11
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD_FILE: /run/secrets/db_root_password
      - MYSQL_DATABASE=fineract_tenants
    secrets:
      - db_root_password
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
  
  fineract:
    image: apache/fineract:latest
    restart: always
    environment:
      - FINERACT_HIKARI_DRIVER_SOURCE_CLASS_NAME=com.mysql.cj.jdbc.Driver
      - FINERACT_HIKARI_JDBC_URL=jdbc:mysql://db:3306/fineract_tenants?createDatabaseIfNotExist=true
      - FINERACT_HIKARI_USERNAME=root
      - FINERACT_HIKARI_PASSWORD_FILE: /run/secrets/fineract_password
      - FINERACT_DEFAULT_TENANTDB_IDENTIFIER=default
      - server.port=8080
    secrets:
      - fineract_password
    depends_on:
      - db
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/fineract-provider/actuator/health"]
      interval: 1m30s
      timeout: 10s
      retries: 10s
      start_period: 30s

  gateway:
    build: .
    restart: always
    environment:
      - FINERACT_BASE_URL=http://fineract:8080/api/v1
      - FINERACT_USERNAME=mifos
      - FINERACT_PASSWORD_FILE=/run/secrets/fineract_password
    secrets:
      - fineract_password
    depends_on:
      - fineract
    ports:
      - "8081:8080"

secrets:
  db_root_password:
    file: secrets/db_root_password.txt
  fineract_password:
    file: secrets/fineract_password.txt

volumes:
  db_data: 

networks:
  fineract-net:
    driver: bridge
